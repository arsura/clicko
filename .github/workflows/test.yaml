name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CLICKHOUSE_VERSION: "26.1"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cache Docker images
        id: docker-cache
        uses: actions/cache@v4
        with:
          path: /tmp/docker-images.tar
          key: docker-clickhouse-${{ env.CLICKHOUSE_VERSION }}

      - name: Load cached Docker images
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/docker-images.tar

      - name: Pull and save Docker images
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          docker pull clickhouse/clickhouse-server:${{ env.CLICKHOUSE_VERSION }}
          docker pull clickhouse/clickhouse-keeper:${{ env.CLICKHOUSE_VERSION }}
          docker save \
            clickhouse/clickhouse-server:${{ env.CLICKHOUSE_VERSION }} \
            clickhouse/clickhouse-keeper:${{ env.CLICKHOUSE_VERSION }} \
            -o /tmp/docker-images.tar

      - name: Start ClickHouse cluster
        run: make cluster-up

      - name: Wait for cluster healthy
        run: |
          for i in $(seq 1 30); do
            if docker compose -f dev/cluster/docker-compose.yaml exec -T ch-1-1 clickhouse-client -q "SELECT 1" >/dev/null 2>&1; then
              echo "Cluster is ready."
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "Cluster failed to start"
          exit 1

      - name: Run tests
        run: make test

      - name: Stop cluster
        if: always()
        run: make cluster-down
